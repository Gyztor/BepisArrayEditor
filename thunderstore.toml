[config]
schemaVersion = "0.0.1"

[package]
namespace = "GyztorMizirath"
name = "ArrayEditor"
versionNumber = "1.0.0"
description = "A Bepis Mod Loader mod that allows arrays to load as lists. Allowing the use of components like GradientStripTexture."
websiteUrl = "https://github.com/Gyztor/BepisArrayEditor"
containsNsfwContent = false

[package.dependencies]
ResoniteModding-BepisLoader = "1.6.0"


[build]
icon = "./Icon.png"
readme = "./README.md"
outdir = "./bin/build"

[[build.copy]]
source = "./LICENSE.md"
target = "/"


[[build.copy]]
source = "./BepisArrayEditor/bin/Release/BepisArrayEditor.dll"
target = "plugins/FixCopyComponentDrives/"

[[build.copy]]
source = "./BepisArrayEditor/bin/Release/BepisArrayEditor.pdb"
target = "plugins/BepisArrayEditor/"

[publish]
repository = "https://thunderstore.io"
communities = ["resonite"]

[publish.categories]
resonite = []


